version: "3.9"

services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./prompts:/app/prompts
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    volumes:
      - ./prompts:/app/prompts
    depends_on:
      - postgres
      - redis

  beat:
    build: .
    command: celery -A app.celery_app.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: code_review
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Observability stack — spin up with: docker compose --profile observability up
  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data:
